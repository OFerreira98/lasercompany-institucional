<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A0404">
  <meta name="robots" content="noindex, nofollow">
  <title>Painel do Franqueado | Laser &amp; Co</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/painel.css">
  <!-- Painel sempre no tema vinho/dourado, independente do tema do site -->
  <script>document.documentElement.setAttribute('data-theme','default')</script>
</head>
<body class="painel-body">

  <div class="painel-backdrop" id="painel-backdrop"></div>

  <div class="painel-shell">
    <aside class="painel-sidebar" id="painel-sidebar">
      <div class="painel-sidebar-brand">
        <img src="assets/logos/logo-bold-dourado.png" alt="Laser & Co">
        <span class="painel-sidebar-tag">Painel<br>Franqueado</span>
      </div>
      <nav class="painel-nav" id="painel-nav" aria-label="Menu do painel"></nav>
    </aside>

    <div class="painel-content">
      <header class="painel-topbar">
        <button class="painel-burger" id="painel-burger" type="button" aria-label="Abrir menu">☰</button>
        <span class="painel-topbar-title">Minha unidade</span>
        <span class="painel-topbar-spacer"></span>
        <div class="painel-user">
          <div class="painel-user-nome" id="painel-user-nome"></div>
          <div class="painel-user-role" id="painel-user-role"></div>
        </div>
        <button class="painel-logout" id="painel-logout" type="button">Sair</button>
      </header>

      <main class="painel-main">
        <div class="painel-view-head">
          <h1 class="painel-h1" id="painel-view-title">Visão Geral</h1>
          <p class="painel-sub" id="painel-view-sub"></p>
        </div>
        <div id="painel-view"></div>
      </main>
    </div>
  </div>

  <div class="painel-modal-overlay" id="painel-detail-modal" role="dialog" aria-modal="true">
    <div class="painel-modal">
      <button class="painel-modal-close" id="painel-detail-close" aria-label="Fechar">&times;</button>
      <div id="painel-detail-content"></div>
    </div>
  </div>

  <script src="scripts/data.js"></script>
  <script src="scripts/analytics.js"></script>
  <script src="scripts/api-client.js"></script>
  <script src="scripts/painel-seed.js"></script>
  <script src="scripts/painel-core.js"></script>
  <script>LaserPainel.init({ mode: 'franqueado' });</script>
</body>
</html>
