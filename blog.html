<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#481712">
  <meta name="description" content="Blog Laser & Co. Conteúdo e cuidados, aprenda com nossas profissionais. Matérias sobre laser, ultrassom, depilação e rejuvenescimento.">
  <title>Blog | Laser & Co</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="assets/logos/avatar-andco-redondo.png">
  <link rel="apple-touch-icon" href="assets/logos/avatar-andco-redondo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/layouts.css">
  <link rel="stylesheet" href="styles/pages.css">
  <script>try{var bs=['default','roteiro-dark','roteiro-light'];var b=localStorage.getItem('laserco_base')||localStorage.getItem('laserco_theme')||'default';var a=localStorage.getItem('laserco_accent')||'';if(bs.indexOf(b)<0){a=a||b;b='default';}var r=document.documentElement;r.setAttribute('data-theme',b);if(a)r.setAttribute('data-accent',a);}catch(e){}</script>
</head>
<body>

<script src="scripts/layout.js"></script>
<div data-include="header"></div>

<main>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow eyebrow-centered">Conteúdo &amp; Cuidados</span>
      <h1 class="page-hero-title">Aprenda com <span class="italic">nossas profissionais.</span></h1>
      <p class="page-hero-sub">Matérias completas sobre laser, ultrassom, depilação, rejuvenescimento e todos os cuidados pra você tirar o melhor de cada protocolo.</p>
    </div>
  </section>

  <section class="section section-light">
    <div class="container">

      <div class="blog-filter-row">
        <input type="search" id="blog-search" class="input input-lg" placeholder="Buscar por palavra-chave (ex: laser, melasma, depilação)" aria-label="Buscar matérias">
        <span class="blog-count"><span id="blog-count">40</span> matérias</span>
      </div>

      <div class="blog-grid blog-grid-4" id="blog-grid-all"></div>

      <p id="blog-empty" class="text-soft text-center" hidden style="margin: var(--sp-6) 0;">Nenhuma matéria encontrada para essa busca.</p>

    </div>
  </section>

</main>

<div data-include="footer"></div>

<script src="scripts/data.js"></script>
<script src="scripts/analytics.js"></script>
<script src="scripts/theme.js"></script>
<script src="scripts/main.js"></script>
<script src="scripts/popup.js"></script>
<script src="scripts/whatsapp.js"></script>
<script src="scripts/chatbot.js"></script>
<script src="scripts/page-blog.js"></script>
</body>
</html>
