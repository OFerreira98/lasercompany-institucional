<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#481712">
  <meta name="description" content="Mais de 70 unidades Laser & Co em 15 estados. Encontre a sua mais próxima.">
  <title>Unidades | Laser & Co</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="assets/logos/avatar-andco-redondo.png">
  <link rel="apple-touch-icon" href="assets/logos/avatar-andco-redondo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/layouts.css">
  <link rel="stylesheet" href="styles/pages.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
  <script>try{var bs=['default','roteiro-dark','roteiro-light'];var b=localStorage.getItem('laserco_base')||localStorage.getItem('laserco_theme')||'default';var a=localStorage.getItem('laserco_accent')||'';if(bs.indexOf(b)<0){a=a||b;b='default';}var r=document.documentElement;r.setAttribute('data-theme',b);if(a)r.setAttribute('data-accent',a);}catch(e){}</script>
</head>
<body class="page-unidades page-has-dark-hero">

<script src="scripts/layout.js"></script>
<div data-include="header"></div>

<main>

  <section class="page-hero page-hero-photo-bg">
    <img class="page-hero-photo-cover" src="assets/img/unidades-hero.png" alt="" onerror="this.remove()">
    <div class="container">
      <span class="eyebrow eyebrow-centered">Onde estamos</span>
      <h1 class="page-hero-title">+70 unidades, <span class="italic">15 estados.</span></h1>
      <p class="page-hero-sub">Estamos onde a beleza acontece. Encontre a unidade Laser &amp; Co mais próxima de você.</p>
    </div>
  </section>

  <section class="section section-light">
    <div class="container">

      <form class="unidades-search" id="unidades-search">
        <div class="input-icon">
          <span class="icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </span>
          <input type="text" id="unidade-input" class="input input-lg" placeholder="Digite seu CEP ou cidade" aria-label="Buscar por CEP ou cidade">
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Buscar unidade</button>
      </form>

      <div class="unidades-map-wrap">
        <div id="unidades-map" class="unidades-map" aria-label="Mapa das unidades Laser & Co"></div>
        <div class="map-overlay-info">
          <span id="map-counter">70</span> unidades em 15 estados
        </div>
      </div>

      <div id="search-result" hidden style="margin-bottom: var(--sp-5); padding: var(--sp-4); background: var(--color-surface); border: 1px solid var(--color-border-accent); border-radius: var(--radius-md);"></div>

      <div class="grid grid-2" style="margin-bottom: var(--sp-5);">
        <div>
          <div class="eyebrow">Filtrar por UF</div>
          <select class="select" id="uf-filter" aria-label="Filtrar por estado">
            <option value="">Todos os estados</option>
          </select>
        </div>
        <div>
          <div class="eyebrow">Filtrar por cidade</div>
          <select class="select" id="cidade-filter" aria-label="Filtrar por cidade">
            <option value="">Todas as cidades</option>
          </select>
        </div>
      </div>

      <div class="unidades-grid" id="unidades-grid"></div>
    </div>
  </section>

</main>

<div data-include="footer"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
<script src="scripts/data.js"></script>
<script src="scripts/analytics.js"></script>
<script src="scripts/cep.js"></script>
<script src="scripts/theme.js"></script>
<script src="scripts/main.js"></script>
<script src="scripts/popup.js"></script>
<script src="scripts/whatsapp.js"></script>
<script src="scripts/chatbot.js"></script>
<script src="scripts/page-unidades.js"></script>
</body>
</html>
