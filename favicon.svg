<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3A1010"/>
      <stop offset="60%" stop-color="#2A0707"/>
      <stop offset="100%" stop-color="#1A0404"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D4A8"/>
      <stop offset="50%" stop-color="#C8A064"/>
      <stop offset="100%" stop-color="#8E6A3A"/>
    </linearGradient>
  </defs>

  <!-- Fundo redondo vinho -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Aro dourado -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- Monograma L&C estilizado -->
  <g fill="url(#gold)" font-family="Georgia, 'Cormorant Garamond', serif" font-style="italic" font-weight="400" text-anchor="middle">
    <text x="32" y="40" font-size="32" letter-spacing="-1">L&amp;C</text>
  </g>
</svg>
